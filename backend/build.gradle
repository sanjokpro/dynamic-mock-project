plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.1'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'
    id 'war'
}

group = 'com.dynamicmock'
version = '1.0.0-SNAPSHOT'
description = 'Dynamic Mock API Server'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

ext {
    graalvmVersion = '23.1.1'
    handlebarsVersion = '4.3.1'
    testcontainersVersion = '1.19.8'
    mockitoVersion = '5.12.0'
    jnaVersion = '5.14.0'
    junitLauncherVersion = '1.11.2'
    grpcVersion = '1.60.0'
    protobufVersion = '3.25.1'
    jposVersion = '2.1.9'
}

def packagingType = (findProperty('packagingType') ?: 'jar').toString()
def buildWithEmbeddedUi = (findProperty('buildWithEmbeddedUi') ?: 'false').toString().toBoolean()

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-mongodb'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    implementation "org.graalvm.polyglot:polyglot:${graalvmVersion}"
    implementation "org.graalvm.polyglot:js:${graalvmVersion}"
    implementation "org.graalvm.polyglot:python:${graalvmVersion}"

    implementation "com.github.jknack:handlebars:${handlebarsVersion}"
    implementation 'io.lettuce:lettuce-core'
    // Jackson dependencies - Spring Boot 4.0.1 requires explicit ObjectMapper bean configuration
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.fasterxml.jackson.core:jackson-core'
    implementation 'com.fasterxml.jackson.core:jackson-annotations'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
    implementation 'com.jayway.jsonpath:json-path:2.9.0'

    implementation 'org.springframework.boot:spring-boot-starter-graphql'
    // Let Spring Boot manage GraphQL Java version for compatibility
    // implementation 'com.graphql-java:graphql-java:21.3'
    // DataLoader support for GraphQL observation/instrumentation - let Spring manage this too
    // implementation 'com.graphql-java:java-dataloader:3.2.0'

    implementation "io.grpc:grpc-netty-shaded:${grpcVersion}"
    implementation "io.grpc:grpc-protobuf:${grpcVersion}"
    implementation "io.grpc:grpc-stub:${grpcVersion}"
    implementation "com.google.protobuf:protobuf-java:${protobufVersion}"
    implementation "com.google.protobuf:protobuf-java-util:${protobufVersion}"

    implementation "org.jpos:jpos:${jposVersion}"

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-test-autoconfigure'
    testImplementation "org.testcontainers:testcontainers:${testcontainersVersion}"
    testImplementation "org.testcontainers:mongodb:${testcontainersVersion}"
    testImplementation "org.testcontainers:junit-jupiter:${testcontainersVersion}"
    testImplementation "org.mockito:mockito-core:${mockitoVersion}"
    testImplementation "org.mockito:mockito-junit-jupiter:${mockitoVersion}"
    testImplementation "net.java.dev.jna:jna:${jnaVersion}"
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

if (packagingType == 'warProvided') {
    dependencies {
        providedRuntime 'org.springframework.boot:spring-boot-starter-tomcat'
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.withType(Test).configureEach {
    // Let Testcontainers/Docker discover host automatically on macOS
}

// Note: The CopyProcessingSpec.getFileMode() deprecation warning comes from
// plugin internals (likely Spring Boot plugin) and will be resolved when plugins are updated.
// This is harmless and doesn't affect functionality.

tasks.named('test') {
    useJUnitPlatform()
    maxParallelForks = 1
    jvmArgs = [
        '-Xmx1g',
        '-XX:MaxMetaspaceSize=512m',
        '-XX:+UseSerialGC',
        '-Djdk.attach.allowAttachSelf=true',
        '--add-opens=java.base/java.lang=ALL-UNNAMED',
        '--add-opens=java.base/sun.nio.ch=ALL-UNNAMED',
        '--add-opens=java.base/java.io=ALL-UNNAMED',
        '--add-opens=java.base/java.util=ALL-UNNAMED'
    ]
}

bootJar {
    enabled = packagingType == 'jar'
    archiveBaseName.set('dynamic-mock-server')
}

bootWar {
    enabled = packagingType.startsWith('war')
    archiveBaseName.set('dynamic-mock-server')
}

tasks.named('jar') {
    enabled = false
}

tasks.named('war') {
    enabled = packagingType.startsWith('war')
}

jacoco {
    toolVersion = '0.8.11'
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
    }
}

jacocoTestCoverageVerification {
    dependsOn test
    violationRules {
        rule {
            element = 'PACKAGE'
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 1.0
            }
        }
    }
}

tasks.named('check') {
    dependsOn 'jacocoTestCoverageVerification'
}

// Optional Angular build + bundle into static resources when enabled with -PbuildWithEmbeddedUi=true
tasks.register('npmInstall', Exec) {
    enabled = buildWithEmbeddedUi
    workingDir = file('../frontend')
    commandLine = ['npm', 'install', '--legacy-peer-deps']
    inputs.file('../frontend/package.json')
    outputs.dir('../frontend/node_modules')
}

tasks.register('npmBuild', Exec) {
    enabled = buildWithEmbeddedUi
    workingDir = file('../frontend')
    commandLine = ['npm', 'run', 'build']
    inputs.dir('../frontend/src')
    inputs.file('../frontend/package.json')
    inputs.file('../frontend/package-lock.json')
    outputs.dir('../frontend/dist/dynamic-mock-frontend/browser')
    dependsOn tasks.named('npmInstall')
}

tasks.register('copyFrontendDist', Copy) {
    enabled = buildWithEmbeddedUi
    dependsOn tasks.named('npmBuild')
    from('../frontend/dist/dynamic-mock-frontend/browser')
    into("$buildDir/resources/main/static")
}

if (buildWithEmbeddedUi) {
    tasks.named('processResources') {
        dependsOn tasks.named('copyFrontendDist')
    }
}

// Configure bootRun task
tasks.named('bootRun') {
    mainClass.set('com.dynamicmock.DynamicMockApplication')
    // Allow bootRun to continue even if MongoDB/Redis are not available
    // The application will log connection errors but won't fail immediately
}

